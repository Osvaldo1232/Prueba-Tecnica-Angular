<app-barra-busqueda (search)="Buscar($event)"></app-barra-busqueda>

<app-lista-peliculas 
  [peliculas]="peliculas" 
  (verDetalle)="abrirModal($event)">
</app-lista-peliculas>

@if (idSeleccionado) {
  <div class="modal-overlay" (click)="cerrarModal()">
    
    <div class="modal-wrapper" (click)="$event.stopPropagation()">
      <button class="btn-cerrar" (click)="cerrarModal()">✕</button>
      
      <app-modal-detalle-pelicula [imdbID]="idSeleccionado"></app-modal-detalle-pelicula>
    </div>

  </div>
}

<router-outlet />
